<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Paint & Sip Gallery</title>

  <style>

    /* Lightbox background */
.lightbox {
  display: none; 
  position: fixed;
  z-index: 1000;
  padding-top: 60px;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  overflow: auto;
  background: rgba(0,0,0,0.8);
}

/* Lightbox image */
.lightbox-content {
  display: block;
  margin: auto;
  max-width: 80%;
  max-height: 80%;
  border-radius: 8px;
  box-shadow: 0 4px 10px rgba(255,255,255,0.3);
}

/* Close button */
.close {
  position: absolute;
  top: 20px;
  right: 35px;
  color: #fff;
  font-size: 40px;
  font-weight: bold;
  cursor: pointer;
}

    /* Page background: subtle canvas texture */
    body {
      margin: 0;
      font-family: "Georgia", serif;
      background: linear-gradient(135deg, #f4e9d8, #e0c9a6);
      background-size: cover;
      color: #333;
    }

    /* Header: looks like a wooden studio sign */
    header {
      background: #8b5e3c;
      padding: 25px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    header h1 {
      color: #fff;
      margin: 0;
      font-size: 36px;
      letter-spacing: 2px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
    }

    /* Gallery grid */
    .gallery {
      display: grid;
    grid-template-columns: repeat(4, 1fr);  /* EXACTLY 4 ACROSS */
      gap: 30px;
      padding: 40px;
    }

    /* Polaroid-style frames */
    .polaroid {
      background: #fff;
      padding: 10px;
      border-radius: 4px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      transform: rotate(-1deg);
      transition: transform 0.2s; 
      width: 100%
      height: 100%
       margin: 0 auto;        /* centers each Polaroid */
    }

    .polaroid:hover {
      transform: rotate(0deg) scale(1.03);
    }

.polaroid img {
  width: auto;
  height: auto;     /* choose your height */
  object-fit: cover; /* keeps the image nicely cropped */
  border-radius: 3px;
}

    .caption {
      text-align: center;
      font-size: 14px;
      margin-top: 8px;
      font-style: italic;
    }

    /* Upcoming section */
    .upcoming {
      background: #fff;
      margin: 40px auto;
      padding: 25px;
      max-width: 700px;
      border-left: 8px solid #8b5e3c;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }

    .upcoming h2 {
      margin-top: 0;
      font-size: 26px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Paint & Sip </h1>
  </header>

<div class="gallery">

  <div class="polaroid">
    <img src="art/Trout.jpg" alt="Trout">
  </div>

  <div class="polaroid">
    <img src="art/Owl.jpg" alt="Owl">
  </div>

  <div class="polaroid">
    <img src="art/Lures.jpg" alt="Lures">
  </div>

  <div class="polaroid">
    <img src="art/River.jpg" alt="River">
  </div>

</div>

  <div class="upcoming">
    <h2>Custom Paint & Sip Sessions</h2>
    <p>
      We’re currently offering custom paint and sip events for private groups,
      birthdays, team-building, and special occasions.  
      Public event dates will be added here soon.
    </p>
  </div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox">
  <span class="close">&times;</span>
  <img class="lightbox-content" id="lightbox-img">
</div>

  <script>
  // Get lightbox elements
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");
  const closeBtn = document.querySelector(".close");

  // Add click event to all gallery images
  document.querySelectorAll(".polaroid img").forEach(img => {
    img.addEventListener("click", () => {
      lightbox.style.display = "block";
      lightboxImg.src = img.src;
    });
  });

  // Close when clicking the X
  closeBtn.addEventListener("click", () => {
    lightbox.style.display = "none";
  });

  // Close when clicking outside the image
  lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) {
      lightbox.style.display = "none";
    }
  });
</script>

</body>
</html>
