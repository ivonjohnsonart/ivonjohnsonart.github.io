<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Paint & Sip Gallery</title>

  <style>
    /* Header styling */
    header {
      background-color: #333;
      padding: 15px;
      text-align: center;
    }

    header h1 {
      color: white;
      margin: 0;
      font-size: 28px;
      letter-spacing: 1px;
    }

    /* Gallery layout */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

  <header>
    <h1>Paint & Sip Gallery</h1>
  </header>

  <p style="text-align:center; font-size:18px; margin-top:20px;">
    A collection of paintings from past Paint & Sip events.
  </p>

  <div class="gallery">
    <!-- Replace these with your real images -->
    <img src="art/Trout.jpg" alt="Trout">
    <img src="art/Owl.jpg" alt="Owl">
    <img src="art/River.jpg" alt="River">
    <img src="art/Lures.jpg" alt="Lures">
  </div>

</body>
</html>
