<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Paint & Sip Gallery</title>

  <style>
    /* ===== PAGE BACKGROUND ===== */
    body {
      margin: 0;
      font-family: "Georgia", serif;
        background: #1a1a1a;
        background-image: url('https://www.transparenttextures.com/patterns/asfalt-light.png');
        color: #eee;
    }

    /* ===== HEADER ===== */
   header {
  background: #000; /* black header */
  padding: 20px 40px;
  display: flex;
  justify-content: space-between; /* left + right alignment */
  align-items: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

header h1 {
  color: #fff;
  margin: 0;
  font-size: 32px;
  letter-spacing: 2px;
}

.back-button {
  background: #fff;
  color: #000;
  padding: 10px 18px;
  border-radius: 4px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.2s;
}

.back-button:hover {
  background: #f0f0f0;
  transform: scale(1.05);
}


    /* ===== GALLERY GRID ===== */
    .gallery {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      justify-items: center;
      gap: 30px;
      padding: 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ===== POLAROID STYLE ===== */
    .polaroid {
      
  background: #fff;
  padding: 10px;
  border-radius: 4px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  transform: rotate(-1deg);
  transition: transform 0.2s;
  width: 100%;
  max-width: 400px;
  position: relative;
  z-index: 2;
    }

    .polaroid:hover {
      transform: rotate(0deg) scale(1.03);
    }

    .polaroid img {
      width: 100%;
      height: 300px;       /* controls image height */
      object-fit: cover;   /* prevents stretching */
      border-radius: 3px;
      cursor: pointer;
    }

    /* ===== UPCOMING SECTION ===== */
    .upcoming {
      background: #fff;
      margin: 40px auto;
      padding: 25px;
      max-width: 700px;
      border-left: 8px solid #8b5e3c;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }

    .upcoming h2 {
      margin-top: 0;
      font-size: 26px;
    }

    /* ===== LIGHTBOX ===== */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 9999;
      padding-top: 60px;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background: rgba(0,0,0,0.8);
    }

    .lightbox-content {
      display: block;
      margin: auto;
      max-width: 80%;
      max-height: 80%;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(255,255,255,0.3);
    }

    .close {
      position: absolute;
      top: 20px;
      right: 35px;
      color: #fff;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <header>
    <h1>Paint and Sip</h1>
    <a href="index.html" class="back-button">Back to Ivon Johnson Art</a>
  </header>

  <!-- ===== GALLERY ===== -->
  <div class="gallery">

    <div class="polaroid">
      <img src="art/Trout.jpg" alt="Trout">
    </div>

    <div class="polaroid">
      <img src="art/Owl.jpg" alt="Owl">
    </div>

    <div class="polaroid">
      <img src="art/Lures.jpg" alt="Lures">
    </div>

    <div class="polaroid">
      <img src="art/River.jpg" alt="River">
    </div>

  </div>

  <!-- ===== UPCOMING SECTION ===== -->
  <div class="upcoming">
    <h2>Custom Paint & Sip Sessions</h2>
    <p>
      We’re currently offering custom paint and sip events for private groups,
      birthdays, team-building, and special occasions.  
      Public event dates will be added here soon.
    </p>
  </div>

  <!-- ===== LIGHTBOX ===== -->
  <div id="lightbox" class="lightbox">
    <span class="close">&times;</span>
    <img class="lightbox-content" id="lightbox-img">
  </div>

  <!-- ===== LIGHTBOX SCRIPT ===== -->
  <script>
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    const closeBtn = document.querySelector(".close");

    document.querySelectorAll(".polaroid img").forEach(img => {
      img.addEventListener("click", () => {
        lightbox.style.display = "block";
        lightboxImg.src = img.src;
      });
    });

    closeBtn.addEventListener("click", () => {
      lightbox.style.display = "none";
    });

  
    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) {
        lightbox.style.display = "none";
      }
    });
  </script>

</body>
</html>
