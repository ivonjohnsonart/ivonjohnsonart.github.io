<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paint & Sip</title>

  <!-- Navigation Bar CSS -->
  <style>
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(17, 24, 39, 0.95);
      backdrop-filter: blur(4px);
      z-index: 50;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }

    .nav-container {
      max-width: 72rem;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-weight: bold;
      font-size: 1.4rem;
      color: white;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .nav-links a:hover {
      color: #9ca3af;
    }

    /* Page Layout */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .content {
      margin-top: 120px; /* Prevents nav overlap */
      max-width: 900px;
      padding: 20px;
      margin-left: auto;
      margin-right: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* Gallery Grid */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      transition: transform 0.2s ease;
    }

    .gallery img:hover {
      transform: scale(1.03);
    }
  </style>
</head>

<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="nav-container">
      <span class="logo">Sip and Paint</span>
      <ul class="nav-links">
        <li><a href="https://ivonjohnsonart.github.io/">Back to Ivon Johnson Art</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="content">
    <h1>Paint & Sip Gallery</h1>

    <p style="text-align:center;">
      Enjoy a look at some of our Sip & Paint creations.  
      More events and artwork coming soon.
    </p>

    <!-- Gallery -->
    <div class="gallery">
      <img src="https://ivonjohnsonart.github.io/art/Trout.jpg" alt="Trout Painting">
      <img src="https://ivonjohnsonart.github.io/art/Owl.jpg" alt="Owl">
      <img src="https://ivonjohnsonart.github.io/art/River.jpg" alt="River">
      <img src="https://ivonjohnsonart.github.io/art/Lures.jpg" alt="Lures">
    </div>
  </div>

</body>
</html>
