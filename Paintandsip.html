<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Paint & Sip Gallery</title>

  <style>
    /* Page background: subtle canvas texture */
    body {
      margin: 0;
      font-family: "Georgia", serif;
      background: #f4f1ea;
      background-size: cover;
      color: #333;
    }

    /* Header: looks like a wooden studio sign */
    header {
      background: #8b5e3c;
      padding: 25px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    header h1 {
      color: #fff;
      margin: 0;
      font-size: 36px;
      letter-spacing: 2px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
    }

    /* Gallery grid */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 30px;
      padding: 40px;
    }

    /* Polaroid-style frames */
    .polaroid {
      background: #fff;
      padding: 10px;
      border-radius: 4px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      transform: rotate(-1deg);
      transition: transform 0.2s;
    }

    .polaroid:hover {
      transform: rotate(0deg) scale(1.03);
    }

   .polaroid img {
  width: 100%;
}

    .caption {
      text-align: center;
      font-size: 14px;
      margin-top: 8px;
      font-style: italic;
    }

    /* Upcoming section */
    .upcoming {
      background: #fff;
      margin: 40px auto;
      padding: 25px;
      max-width: 700px;
      border-left: 8px solid #8b5e3c;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }

    .upcoming h2 {
      margin-top: 0;
      font-size: 26px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Inside the Studio</h1>
  </header>

  <div class="gallery">
    <div class="polaroid">
      <img src="art/Trout.jpg" alt="Trout">
     
    <div class="polaroid">
      <img src="art/Owl.jpg" alt="Owl">
    
    <div class="polaroid">
      <img src="art/Lures.jpg" alt="Lures">

      <div class="polaroid">
      <img src="art/River.jpg" alt="Lures">
  </div>

  <div class="upcoming">
    <h2>Custom Paint & Sip Sessions</h2>
    <p>
      We’re currently offering custom paint and sip events for private groups,
      birthdays, team-building, and special occasions.  
      Public event dates will be added here soon.
    </p>
  </div>

</body>
</html>
